name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      eas_build:
        description: "Trigger a native EAS build (preview profile)"
        required: false
        default: false
        type: boolean

# Cancel any in-progress runs on the same ref
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # 1. Deploy web app to Vercel
  # ──────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────
  # 2. Publish OTA update via EAS Update
  #    Skipped when a native EAS build is requested
  # ──────────────────────────────────────────────
  deploy-eas-update:
    name: EAS Update (OTA)
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.eas_build == true) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Publish OTA update
        run: eas update --branch preview --message "${{ github.event.release.tag_name || 'manual deploy' }}" --non-interactive --no-wait

  # ──────────────────────────────────────────────
  # 3. (Optional) Trigger a native EAS Build
  # ──────────────────────────────────────────────
  deploy-eas-build:
    name: EAS Build (Native)
    if: github.event_name == 'workflow_dispatch' && inputs.eas_build == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Android (preview)
        run: eas build --platform android --profile preview --non-interactive --no-wait

      # Uncomment when iOS credentials are set up:
      # - name: Build iOS (preview)
      #   run: eas build --platform ios --profile preview --non-interactive
